# NOTE: -Djdk.net.unixdomain.tmpdir works around a Windows env where the default
# TEMP path breaks JDK's AF_UNIX NIO pipe (Gradle "Unable to establish loopback connection").
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:\\bstmp
org.gradle.caching=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# App version ??? bump these to publish an update (release.ps1 does it for you).
APP_VERSION_CODE=3
APP_VERSION_NAME=1.2
